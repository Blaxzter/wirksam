name: Playwright Tests

on:
    push:
        branches:
            - master
        paths:
            - "backend/**"
            - "frontend/**"
            - ".env"
            - "docker-compose*.yml"
            - ".github/workflows/playwright.yml"
    pull_request:
        types:
            - opened
            - synchronize
        paths:
            - "backend/**"
            - "frontend/**"
            - ".env"
            - "docker-compose*.yml"
            - ".github/workflows/playwright.yml"
    workflow_dispatch:
        inputs:
            debug_enabled:
                description: "Run the build with tmate debugging enabled (https://github.com/marketplace/actions/debugging-with-tmate)"
                required: false
                default: "false"

permissions:
    contents: read

jobs:
    changes:
        runs-on: ubuntu-latest
        # Set job outputs to values from filter step
        outputs:
            changed: ${{ steps.filter.outputs.changed }}
        steps:
            - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
            # For pull requests it's not necessary to checkout the code but for the main branch it is
            - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
              id: filter
              with:
                  filters: |
                      changed:
                        - backend/**
                        - frontend/**
                        - .env
                        - docker-compose*.yml
                        - .github/workflows/playwright.yml

    test-playwright:
        needs:
            - changes
        if: ${{ needs.changes.outputs.changed == 'true' }}
        timeout-minutes: 60
        runs-on: ubuntu-latest
        strategy:
            matrix:
                shardIndex: [1, 2, 3, 4]
                shardTotal: [4]
            fail-fast: false
        steps:
            - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
            - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
              with:
                  node-version: lts/*
            - name: Install pnpm
              run: corepack enable && corepack prepare pnpm@latest --activate
            - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
              with:
                  python-version: "3.13"
            - name: Setup tmate session
              uses: mxschmitt/action-tmate@c0afd6f790e3a5564914980036ebf83216678101 # v3
              if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.debug_enabled == 'true' }}
              with:
                  limit-access-to-actor: true
            - name: Install uv
              uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
              with:
                  version: "0.4.15"
                  enable-cache: true
            - run: uv sync
              working-directory: backend
            - run: pnpm install --frozen-lockfile
              working-directory: frontend
            - name: Create .env file
              run: cp .env.example .env
            - run: uv run bash scripts/generate-client.sh
              env:
                  VIRTUAL_ENV: backend/.venv
            - name: Create external network
              run: docker network create traefik-net || true
            - run: docker compose -f docker-compose.yml -f docker-compose.override.yml build
            - run: docker compose -f docker-compose.yml -f docker-compose.override.yml down -v --remove-orphans
            - name: Start backend and wait for healthy
              run: docker compose -f docker-compose.yml -f docker-compose.override.yml up -d --wait backend mailcatcher
            - name: Run Playwright tests
              run: docker compose -f docker-compose.yml -f docker-compose.override.yml run --rm playwright npx playwright test --fail-on-flaky-tests --trace=retain-on-failure --shard=${{ matrix.shardIndex }}/${{ matrix.shardTotal }}
            - run: docker compose -f docker-compose.yml -f docker-compose.override.yml down -v --remove-orphans
            - name: Upload blob report to GitHub Actions Artifacts
              if: ${{ !cancelled() }}
              uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
              with:
                  name: blob-report-${{ matrix.shardIndex }}
                  path: frontend/blob-report
                  include-hidden-files: true
                  retention-days: 1

    merge-playwright-reports:
        needs:
            - test-playwright
            - changes
        # Merge reports after playwright-tests, even if some shards have failed
        if: ${{ !cancelled() && needs.changes.outputs.changed == 'true' }}
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
            - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
              with:
                  node-version: lts/*
            - name: Install pnpm
              run: corepack enable && corepack prepare pnpm@latest --activate
            - name: Install dependencies
              run: pnpm install --frozen-lockfile
              working-directory: frontend
            - name: Download blob reports from GitHub Actions Artifacts
              uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
              with:
                  path: frontend/all-blob-reports
                  pattern: blob-report-*
                  merge-multiple: true
            - name: Merge into HTML Report
              run: npx playwright merge-reports --reporter html ./all-blob-reports
              working-directory: frontend
            - name: Upload HTML report
              uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
              with:
                  name: html-report--attempt-${{ github.run_attempt }}
                  path: frontend/playwright-report
                  retention-days: 30
                  include-hidden-files: true

    # https://github.com/marketplace/actions/alls-green#why
    alls-green-playwright: # This job does nothing and is only used for the branch protection
        if: always()
        needs:
            - test-playwright
        runs-on: ubuntu-latest
        steps:
            - name: Decide whether the needed jobs succeeded or failed
              uses: re-actors/alls-green@05ac9388f0aebcb5727afa17fcccfecd6f8ec5fe # release/v1
              with:
                  jobs: ${{ toJSON(needs) }}
                  allowed-skips: test-playwright
