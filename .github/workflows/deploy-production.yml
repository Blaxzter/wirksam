name: Deploy to Production

on:
  release:
    types:
      - published

env:
  REGISTRY: ghcr.io

permissions:
  contents: read

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set image names
        id: images
        run: |
          REPO_LOWER=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          echo "backend=ghcr.io/${REPO_LOWER}/backend" >> "$GITHUB_OUTPUT"
          echo "frontend=ghcr.io/${REPO_LOWER}/frontend" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version tag
        id: meta
        run: echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"

      - name: Build and push backend image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: ./backend
          push: true
          tags: |
            ${{ steps.images.outputs.backend }}:${{ steps.meta.outputs.tag }}
            ${{ steps.images.outputs.backend }}:latest
          cache-from: type=registry,ref=${{ steps.images.outputs.backend }}:buildcache
          cache-to: type=registry,ref=${{ steps.images.outputs.backend }}:buildcache,mode=max

      - name: Build and push frontend image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ steps.images.outputs.frontend }}:${{ steps.meta.outputs.tag }}
            ${{ steps.images.outputs.frontend }}:latest
          build-args: |
            VITE_API_URL=https://${{ secrets.API_DOMAIN }}/api/v1
            VITE_AUTH0_DOMAIN=${{ secrets.VITE_AUTH0_DOMAIN }}
            VITE_AUTH0_CLIENT_ID=${{ secrets.VITE_AUTH0_CLIENT_ID }}
            VITE_AUTH0_API_AUDIENCE=${{ secrets.VITE_AUTH0_API_AUDIENCE }}
            VITE_AUTH0_CALLBACK_URL=https://${{ secrets.DOMAIN_PRODUCTION }}/callback
            NODE_ENV=production
          cache-from: type=registry,ref=${{ steps.images.outputs.frontend }}:buildcache
          cache-to: type=registry,ref=${{ steps.images.outputs.frontend }}:buildcache,mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    permissions: {}

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2 # v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          envs: GHCR_PAT,GHCR_USER,DEPLOY_PATH
          script: |
            set -e

            cd "$DEPLOY_PATH"

            # Pull latest compose and config files
            git pull --ff-only

            # Log in to GHCR
            echo "$GHCR_PAT" | docker login ghcr.io -u "$GHCR_USER" --password-stdin

            # Pull new images and restart (exclude override to avoid dev settings)
            docker compose -f docker-compose.yml pull backend frontend prestart
            docker compose -f docker-compose.yml up -d --remove-orphans

            # Verify prestart completed successfully
            echo "Checking prestart status..."
            docker compose -f docker-compose.yml wait prestart

            # Wait for backend health check
            echo "Waiting for backend to become healthy..."
            timeout 120 bash -c 'until docker compose -f docker-compose.yml ps backend | grep -q "healthy"; do sleep 5; done'
            echo "Deployment complete!"
        env:
          GHCR_PAT: ${{ secrets.GHCR_PAT }}
          GHCR_USER: ${{ github.actor }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
